<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Contact Me - Hyemin Doo Resume</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Fixed Navigation Bar -->
  <header>
    <nav class="navbar">
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="education.html">Education</a></li>
        <li><a href="experience.html">Experience</a></li>
        <li><a href="contact.html" class="active">Contact Me</a></li>
      </ul>
    </nav>
  </header>

  <!-- Main Content -->
  <main>
    <section class="contact">
      <h1>Contact Me</h1>
      <!-- The mailto: form launches the user's default email client -->
      <form action="mailto:dannydoo1234@gmail.com" method="post" enctype="text/plain">
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" required>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required>

        <label for="subject">Subject:</label>
        <!-- Using placeholder instead of value so the hint disappears when typing -->
        <input type="text" id="subject" name="subject" required>

        <label for="message">Message:</label>
        <textarea id="message" name="message" rows="6" required placeholder="Please tell me what you think!"></textarea>

        <button type="submit" class="btn">Submit</button>
      </form>
    </section>
  </main>

  <!-- Footer -->
  <footer>
    <p>&copy; 2025 Hyemin Doo</p>
  </footer>
</body>
</html>
